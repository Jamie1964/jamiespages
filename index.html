<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jamie’s Pages — Projects, Rules & Philosophy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@1,300&display=swap" rel="stylesheet">

<style>
    body {
        margin:0;
        background:#111;
        color:#fff;
        font-family:'Roboto Condensed', sans-serif;
        font-style:italic;
    }

    /* HEADER */
    .header {
        width:100%;
        height:160px;
        background:#111;
        position:fixed;
        top:0;
        left:0;
        z-index:999;
        text-align:center;
    }

    .header img {
        height:100%;
        width:auto;
        object-fit:contain;
        filter:drop-shadow(0 0 18px #b366ff);
    }

    /* STATIC SIDEBAR */
    #sidebar {
        width:272px;
        background:#111;
        color:#fff;
        position:fixed;
        top:160px;
        left:0;
        bottom:0;
        overflow-y:auto;
        padding:20px 12px;
        box-shadow:0 0 20px #000;
        z-index:998;
        font-family:'Roboto Condensed', sans-serif;
        font-style:italic;
    }

    #sidebar h2 {
        font-size:22px;
        color:#b366ff;
        margin-top:0;
        text-shadow:0 0 12px #b366ff;
    }

    #sidebar a {
        display:block;
        padding:10px;
        margin-bottom:8px;
        background:#222;
        color:#b366ff;
        text-decoration:underline;
        border-radius:6px;
        text-shadow:0 0 12px #b366ff;
    }

    #sidebar a:hover {
        text-shadow:0 0 22px #b366ff;
    }

    /* MAIN WRAPPER */
    .page-wrapper {
        margin-left:272px;
        padding:40px 25px;
        margin-top:180px;
        max-width:900px;
    }

    .content-inner {
        padding-left:35px;
    }

    h1 {
        font-size:42px;
        margin-bottom:10px;
        color:#b366ff;
        text-shadow:0 0 18px #b366ff;
    }

    h2 {
        font-size:28px;
        margin-top:40px;
        color:#b366ff;
        text-shadow:0 0 12px #b366ff;
    }

    a {
        color:#b366ff;
        text-decoration:underline;
        text-shadow:0 0 12px #b366ff;
    }

    a:hover {
        text-shadow:0 0 22px #b366ff;
        font-style:italic;
    }

    .logo-link img {
        width:450px;
        max-width:100%;
        display:block;
        margin:20px auto;
        filter:drop-shadow(0 0 12px #b366ff);
        transition:0.2s ease;
    }

    .logo-link img:hover {
        filter:drop-shadow(0 0 22px #b366ff);
    }

    /* REMOVE PURPLE SHADOW FROM WPTF LOGO */
    .wptf-logo {
        filter:none !important;
    }

    /* REMOVE PURPLE SHADOW FROM FCC LOGO */
    .fcc-logo {
        filter:none !important;
    }

    .jp-button {
        display:inline-block;
        padding:6px 18px;
        border-radius:999px;
        border:2px solid #b366ff;
        color:#b366ff;
        text-decoration:underline;
        text-shadow:0 0 12px #b366ff;
        box-shadow:0 0 14px #b366ff;
        font-size:22px;
        font-weight:400;
        margin:30px auto 10px auto;
        transition:.15s;
        white-space:nowrap;
    }

    .jp-button:hover {
        border-color:#d1a3ff;
        color:#d1a3ff;
        box-shadow:0 0 22px #d1a3ff;
    }

    #footer-loader {
        text-align:center;
        margin-top:40px;
        color:#888;
    }

    #pageviews {
        text-align:center;
        margin-top:40px;
        font-size:16px;
        color:#b366ff;
        text-shadow:0 0 12px #b366ff;
    }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <img src="https://jamiespages.com/images/jamiespagessite-logo.png" alt="Jamie’s Pages">
</div>

<!-- STATIC SIDEBAR (TRIMMED DOWN) -->
<div id="sidebar">

    <h2>Navigation</h2>

    <a href="/index.html">Home</a>
    <a href="/contactform.html">Contact Form</a>

</div>

<!-- MAIN CONTENT -->
<div class="page-wrapper">
<div class="content-inner">

    <h1>Website Design</h1>

    <p>I started creating websites in May 2026. So far, this is where I am...</p>

    <h2>My Live Websites</h2>

    <!-- FCC LOGO — NO PURPLE SHADOW -->
    <a class="logo-link" href="https://free-casino-chips.com" target="_blank">
        <img class="fcc-logo" src="https://free-casino-chips.com/images/logotransparent.png" alt="Free-Casino-Chips.com">
    </a>

    <br><br>

    <h2>Projects Under Construction</h2>

    <!-- WPTF LOGO — NO PURPLE SHADOW -->
    <a class="logo-link" href="https://wepaythefreight.com" target="_blank">
        <img class="wptf-logo" src="https://wepaythefreight.com/images/WPTF-logo.png" alt="WePayTheFreight.com">
    </a>

    <!-- JP LOGO -->
    <a class="logo-link" href="https://jamiespages.com">
        <img src="https://jamiespages.com/images/jamiespagessite-logo.png" alt="Jamie’s Pages">
    </a>

    <!-- CONTACT BUTTON -->
    <div style="text-align:center;">
        <a href="contactform.html" class="jp-button">contact jamie</a>
    </div>

    <!-- PAGE VIEW COUNTER -->
    <div id="pageviews"></div>

    <!-- FOOTER LOADER -->
    <div id="footer-loader">Loading footer…</div>

</div>
</div>

<script>
// PAGEVIEWS (still works with your Worker)
fetch("/api/pageviews?path=/index.html")
    .then(r => r.json())
    .then(d => {
        document.getElementById("pageviews").textContent =
            "Page views: " + (d.views || 0);
    });

// FOOTER
fetch("/footer.html")
    .then(r => r.text())
    .then(html => {
        document.getElementById("footer-loader").innerHTML = html;
    });
</script>

</body>
</html>
