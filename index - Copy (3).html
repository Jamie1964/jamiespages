<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jamie’s Pages — Projects, Rules & Philosophy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@1,300&display=swap" rel="stylesheet">

<!-- INLINE STYLE -->
<style>
    body {
        margin:0;
        background:#111;
        color:#fff;
        font-family:'Roboto Condensed', sans-serif;
        font-style:italic;
    }

    /* HEADER */
    .header {
        width:100%;
        height:160px;
        background:#111;
        position:fixed;
        top:0;
        left:0;
        z-index:999;
        text-align:center;
        border-bottom:none;
    }

    .header img {
        height:100%;
        width:auto;
        object-fit:contain;
        filter:drop-shadow(0 0 18px #b366ff);
    }

    /* LAYOUT */
    .layout {
        display:flex;
        margin-top:200px;
    }

    /* SIDEBAR */
    #sidebar {
        width:272px;
        padding-left:12px;
        margin-top:-12px;
        min-height:100vh;
        overflow-y:auto;
    }

    /* MAIN CONTENT */
    .main {
        flex:1;
        padding:0 25px;
        max-width:900px;
    }

    h1 {
        font-size:42px;
        margin-bottom:10px;
        color:#b366ff;
        text-shadow:0 0 18px #b366ff;
    }

    h2 {
        font-size:28px;
        margin-top:30px;
        color:#b366ff;
        text-shadow:0 0 12px #b366ff;
    }

    /* JAMIEPAGES LINK STYLE */
    a {
        color:#b366ff;
        text-decoration:underline;
        text-decoration-thickness:1px;
        text-underline-offset:0px;
        text-shadow:0 0 12px #b366ff;
    }

    a:hover {
        text-shadow:0 0 22px #b366ff;
        font-style:italic;
    }

    /* OUTLINED LINKS (BUTTONS) */
    .outline-link {
        display:inline-block;
        padding:6px 14px;
        margin:6px 0;
        border:1px solid #b366ff;
        border-radius:6px;
        color:#b366ff;
        text-decoration:none;
        font-size:18px;
        text-shadow:0 0 12px #b366ff;
    }

    .outline-link:hover {
        border-color:#d1a3ff;
        color:#d1a3ff;
        text-shadow:0 0 22px #b366ff;
    }

    /* FOOTER */
    footer {
        margin-top:80px;
        padding:25px 0;
        text-align:center;
        font-size:14px;
        color:#aaa;
        border-top:none;
    }
</style>

</head>
<body>

<!-- HEADER -->
<div class="header">
    <img src="https://jamiespages.com/images/jamiespagessite-logo.png" alt="Jamie’s Pages">
</div>

<div class="layout">

    <!-- SIDEBAR -->
    <div id="sidebar"></div>

    <script>
    fetch('https://jamiespages.com/sidebar.html')
        .then(r => r.text())
        .then(html => { document.getElementById('sidebar').innerHTML = html; })
        .catch(() => { document.getElementById('sidebar').innerHTML = "<p style='color:#888;'>Sidebar unavailable</p>"; });
    </script>

    <!-- MAIN CONTENT -->
    <div class="main">

        <h1>Website Design</h1>
        <p>I’ve started creating websites. So far, I am here:</p>

        <h2>My Live Websites</h2>

        <a class="outline-link" href="https://free-casino-chips.com" target="_blank">
            Free-Casino-Chips.com
        </a>
        <br>
        <a class="outline-link" href="https://wepaythefreight.com" target="_blank">
            WePayTheFreight.com
        </a>

        <h2>Projects Under Construction</h2>
        <p>This site (jamiespages.com) will host my rule systems, philosophy pages, and future projects.</p>

    </div>
</div>

<!-- FOOTER -->
<footer>
    © 2026 jamiespages.com — All rights reserved.
</footer>

</body>
</html>
