<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>contact jamie</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@1,300&display=swap" rel="stylesheet">

<style>
    body {
        margin:0;
        background:#111;
        color:#fff;
        font-family:'Roboto Condensed', sans-serif;
        font-style:italic;
    }

    /* HEADER */
    .header {
        width:100%;
        height:160px;
        background:#111;
        position:fixed;
        top:0;
        left:0;
        z-index:999;
        text-align:center;
    }

    .header img {
        height:100%;
        width:auto;
        object-fit:contain;
        filter:drop-shadow(0 0 18px #b366ff);
    }

    /* STATIC SIDEBAR */
    #sidebar {
        width:272px;
        background:#111;
        color:#fff;
        position:fixed;
        top:160px;
        left:0;
        bottom:0;
        overflow-y:auto;
        padding:20px 12px;
        box-shadow:0 0 20px #000;
        z-index:998;
        font-family:'Roboto Condensed', sans-serif;
        font-style:italic;
    }

    #sidebar h2 {
        font-size:22px;
        color:#b366ff;
        margin-top:0;
        text-shadow:0 0 12px #b366ff;
    }

    #sidebar a {
        display:block;
        padding:10px;
        margin-bottom:8px;
        background:#222;
        color:#b366ff;
        text-decoration:underline;
        border-radius:6px;
        text-shadow:0 0 12px #b366ff;
    }

    #sidebar a:hover {
        text-shadow:0 0 22px #b366ff;
    }

    /* MAIN WRAPPER */
    .page-wrapper {
        margin-left:272px;
        padding:40px 25px;
        margin-top:180px;
        max-width:900px;
    }

    .content-inner {
        padding-left:35px;
    }

    h1 {
        font-size:42px;
        margin-bottom:10px;
        color:#b366ff;
        text-shadow:0 0 18px #b366ff;
    }

    label {
        font-size:20px;
        color:#b366ff;
        text-shadow:0 0 12px #b366ff;
    }

    input, textarea {
        width:100%;
        max-width:600px;
        padding:10px;
        margin-top:6px;
        margin-bottom:20px;
        border-radius:6px;
        border:2px solid #b366ff;
        background:#222;
        color:#fff;
        font-family:'Roboto Condensed', sans-serif;
        font-style:italic;
        font-size:18px;
        box-shadow:0 0 12px #b366ff;
    }

    textarea {
        height:160px;
        resize:vertical;
    }

    /* JP BUTTON */
    .jp-button {
        display:inline-block;
        padding:6px 18px;
        border-radius:999px;
        border:2px solid #b366ff;
        color:#b366ff;
        text-decoration:underline;
        text-shadow:0 0 12px #b366ff;
        box-shadow:0 0 14px #b366ff;
        font-size:22px;
        font-weight:400;
        margin:10px 0 20px 0;
        transition:.15s;
        white-space:nowrap;
    }

    .jp-button:hover {
        border-color:#d1a3ff;
        color:#d1a3ff;
        box-shadow:0 0 22px #d1a3ff;
    }

    #thankyou {
        margin-top:30px;
        font-size:20px;
        color:#b366ff;
        text-shadow:0 0 12px #b366ff;
        display:none;
    }

    #footer-loader {
        text-align:center;
        margin-top:40px;
        color:#888;
    }

    .message-note {
        font-size:18px;
        color:#b366ff;
        text-shadow:0 0 12px #b366ff;
        margin-bottom:10px;
        max-width:600px;
    }

    .posted-message {
        margin-top:25px;
        padding:15px;
        max-width:600px;
        border-left:3px solid #b366ff;
        background:#1a1a1a;
        box-shadow:0 0 12px #b366ff;
        border-radius:6px;
        white-space:pre-wrap;
    }

    .posted-meta {
        font-size:14px;
        color:#b366ff;
        margin-bottom:6px;
        text-shadow:0 0 12px #b366ff;
    }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <img src="https://jamiespages.com/images/jamiespagessite-logo.png" alt="Jamie’s Pages">
</div>

<!-- STATIC SIDEBAR -->
<div id="sidebar">

    <h2>Navigation</h2>

    <a href="/index.html">Home</a>
    <a href="/contactform.html">Contact Form</a>

</div>

<!-- MAIN CONTENT -->
<div class="page-wrapper">
<div class="content-inner">

    <h1>contact jamie</h1>

    <form id="contactForm" onsubmit="submitForm(event)">

        <label>Name (optional)</label><br>
        <input type="text" id="name" placeholder="your name">

        <br>
        <label>Email (optional)</label><br>
        <input type="email" id="email" placeholder="your email">

        <br>
        <label>Your Message</label><br>
        <textarea id="message" placeholder="type your message here..." required></textarea>

        <div class="message-note">
            Your message will appear here after you leave it, please be 'family friendly', thank you.
        </div>

        <div style="text-align:left;">
            <button type="submit" class="jp-button">send message</button>
        </div>

    </form>

    <div id="thankyou">thank you — your message has been sent.</div>

    <div id="messages"></div>

    <div id="footer-loader">Loading footer…</div>

</div>
</div>

<script>
function loadMessages() {
    const saved = JSON.parse(localStorage.getItem("jp_messages") || "[]");
    const container = document.getElementById("messages");
    container.innerHTML = "";

    saved.forEach(msg => {
        const box = document.createElement("div");
        box.className = "posted-message";

        box.innerHTML = `
            <div class="posted-meta">${msg.name} — ${msg.date}</div>
            ${msg.text}
        `;

        container.appendChild(box);
    });
}

function submitForm(e) {
    e.preventDefault();

    const name = document.getElementById("name").value || "Anonymous";
    const email = document.getElementById("email").value || "";
    const text = document.getElementById("message").value.trim();

    if (!text) return;

    const entry = {
        name: name,
        email: email,
        text: text,
        date: new Date().toLocaleString()
    };

    const saved = JSON.parse(localStorage.getItem("jp_messages") || "[]");
    saved.push(entry);
    localStorage.setItem("jp_messages", JSON.stringify(saved));

    loadMessages();

    document.getElementById("thankyou").style.display = "block";
    document.getElementById("contactForm").reset();
}

loadMessages();

fetch("/footer.html")
    .then(r => r.text())
    .then(html => {
        document.getElementById("footer-loader").innerHTML = html;
    });
</script>

</body>
