<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>contact jamie</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@1,300&display=swap" rel="stylesheet">

<style>
    body {
        margin:0;
        background:#111;
        color:#fff;
        font-family:'Roboto Condensed', sans-serif;
        font-style:italic;
    }

    /* HEADER */
    .header {
        width:100%;
        height:160px;
        background:#111;
        position:fixed;
        top:0;
        left:0;
        z-index:999;
        text-align:center;
    }

    .header img {
        height:100%;
        width:auto;
        object-fit:contain;
        filter:drop-shadow(0 0 18px #b366ff);
    }

    /* SIDEBAR */
    #sidebar {
        width:272px;
        background:#111;
        color:#fff;
        position:fixed;
        top:160px;
        left:0;
        bottom:0;
        overflow-y:auto;
        padding:20px 12px;
        box-shadow:0 0 20px #000;
        z-index:998;
        font-family:'Roboto Condensed', sans-serif;
        font-style:italic;
    }

    /* MAIN WRAPPER */
    .page-wrapper {
        margin-left:272px;
        padding:40px 25px;
        margin-top:180px;
        max-width:900px;
    }

    .content-inner {
        padding-left:35px;
    }

    h1 {
        font-size:42px;
        margin-bottom:10px;
        color:#b366ff;
        text-shadow:0 0 18px #b366ff;
    }

    label {
        font-size:20px;
        color:#b366ff;
        text-shadow:0 0 12px #b366ff;
    }

    input, textarea {
        width:100%;
        max-width:600px;
        padding:10px;
        margin-top:6px;
        margin-bottom:20px;
        border-radius:6px;
        border:2px solid #b366ff;
        background:#222;
        color:#fff;
        font-family:'Roboto Condensed', sans-serif;
        font-style:italic;
        font-size:18px;
        box-shadow:0 0 12px #b366ff;
    }

    textarea {
        height:160px;
        resize:vertical;
    }

    /* JP BUTTON */
    .jp-button {
        display:inline-block;
        padding:6px 18px;
        border-radius:999px;
        border:2px solid #b366ff;
        color:#b366ff;
        text-decoration:underline;
        text-shadow:0 0 12px #b366ff;
        box-shadow:0 0 14px #b366ff;
        font-size:22px;
        font-weight:400;
        margin:10px 0 20px 0;
        transition:.15s;
        white-space:nowrap;
    }

    .jp-button:hover {
        border-color:#d1a3ff;
        color:#d1a3ff;
        box-shadow:0 0 22px #d1a3ff;
    }

    #thankyou {
        margin-top:30px;
        font-size:20px;
        color:#b366ff;
        text-shadow:0 0 12px #b366ff;
        display:none;
    }

    #footer-loader {
        text-align:center;
        margin-top:40px;
        color:#888;
    }

    /* NEW MESSAGE DISPLAY TEXT */
    .message-note {
        font-size:18px;
        color:#b366ff;
        text-shadow:0 0 12px #b366ff;
        margin-bottom:10px;
        max-width:600px;
    }

    /* MESSAGE BOXES */
    .posted-message {
        margin-top:25px;
        padding:15px;
        max-width:600px;
        border-left:3px solid #b366ff;
        background:#1a1a1a;
        box-shadow:0 0 12px #b366ff;
        border-radius:6px;
        white-space:pre-wrap;
    }

    .posted-meta {
        font-size:14px;
        color:#b366ff;
        margin-bottom:6px;
        text-shadow:0 0 12px #b366ff;
    }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <img src="https://jamiespages.com/images/jamiespagessite-logo.png" alt="Jamie’s Pages">
</div>

<!-- SIDEBAR -->
<div id="sidebar"></div>

<script>
async function buildSidebar() {
    const sidebar = document.getElementById("sidebar");

    let data;
    try {
        const res = await fetch("/api/pages");
        data = await res.json();
    } catch (e) {
        sidebar.innerHTML = "<p style='color:#888;'>Sidebar unavailable</p>";
        return;
    }

    const pages = data.pages || [];

    const HIDDEN_FOLDERS = ["amin", "images"];
    const HIDDEN_FILES = [
        "footer.html",
        "index2.html",
        "copilotbackupentrances.html",
        "tools - Copy.html",
        "FULL WPTF TEMPLATE WITH ALL ADMIN TOYS.html"
    ];

    const allowed = pages.filter(path => {
        const isFile = path.includes("/");
        if (HIDDEN_FOLDERS.some(f => path === f || path.startsWith(f + "/"))) return false;
        if (HIDDEN_FILES.includes(path)) return false;
        if (isFile && path.endsWith("index.html") && path !== "index.html") return false;
        return true;
    });

    const groups = {};
    allowed.forEach(path => {
        const parts = path.split("/");
        if (parts.length === 1) {
            if (!groups["_root"]) groups["_root"] = [];
            groups["_root"].push(parts[0]);
        } else {
            const folder = parts[0];
            const file = parts.slice(1).join("/");
            if (!groups[folder]) groups[folder] = [];
            groups[folder].push(file);
        }
    });

    sidebar.innerHTML = `
        <h2 style="color:#b366ff;font-size:26px;margin:0 0 10px 0;text-shadow:0 0 12px #b366ff;">
            Jamie’s Pages
        </h2>
    `;

    function addGroup(title, items, base="") {
        const header = document.createElement("div");
        header.textContent = title + " ▼";
        header.style.marginTop = "20px";
        header.style.fontWeight = "bold";
        header.style.color = "#b366ff";
        header.style.cursor = "pointer";
        header.style.textShadow = "0 0 12px #b366ff";

        const list = document.createElement("div");
        list.style.marginLeft = "10px";
        list.style.marginTop = "5px";
        list.style.display = "none";

        items.forEach(item => {
            const link = document.createElement("a");
            link.href = "/" + (base ? base + "/" + item : item);
            link.textContent = item.replace(".html","");
            link.style.color = "#fff";
            link.style.textDecoration = "none";
            link.style.display = "block";
            link.style.margin = "6px 0";
            link.style.textShadow = "0 0 12px #b366ff";
            list.appendChild(link);
        });

        header.onclick = () => {
            const hidden = list.style.display === "none";
            list.style.display = hidden ? "block" : "none";
            header.textContent = title + (hidden ? " ▼" : " ▲");
        };

        sidebar.appendChild(header);
        sidebar.appendChild(list);
    }

    if (groups["_root"]) addGroup("Site Pages", groups["_root"]);

    Object.keys(groups)
        .filter(k => k !== "_root")
        .sort()
        .forEach(folder => {
            addGroup(folder.charAt(0).toUpperCase() + folder.slice(1), groups[folder], folder);
        });
}

buildSidebar();
</script>

<!-- MAIN CONTENT -->
<div class="page-wrapper">
<div class="content-inner">

    <h1>contact jamie</h1>

    <form id="contactForm" onsubmit="submitForm(event)">

        <label>Name (optional)</label><br>
        <input type="text" id="name" placeholder="your name">

        <br>
        <label>Email (optional)</label><br>
        <input type="email" id="email" placeholder="your email">

        <br>
        <label>Your Message</label><br>
        <textarea id="message" placeholder="type your message here..." required></textarea>

        <!-- NEW MESSAGE DISPLAY TEXT -->
        <div class="message-note">
            Your message will appear here after you leave it, please be 'family friendly', thank you.
        </div>

        <!-- LEFT‑JUSTIFIED BUTTON BELOW TEXTAREA -->
        <div style="text-align:left;">
            <button type="submit" class="jp-button">send message</button>
        </div>

    </form>

    <div id="thankyou">thank you — your message has been sent.</div>

    <!-- WHERE MESSAGES WILL APPEAR -->
    <div id="messages"></div>

    <div id="footer-loader">Loading footer…</div>

</div>
</div>

<script>
/* LOAD EXISTING MESSAGES */
function loadMessages() {
    const saved = JSON.parse(localStorage.getItem("jp_messages") || "[]");
    const container = document.getElementById("messages");
    container.innerHTML = "";

    saved.forEach(msg => {
        const box = document.createElement("div");
        box.className = "posted-message";

        box.innerHTML = `
            <div class="posted-meta">${msg.name} — ${msg.date}</div>
            ${msg.text}
        `;

        container.appendChild(box);
    });
}

/* SUBMIT FORM */
function submitForm(e) {
    e.preventDefault();

    const name = document.getElementById("name").value || "Anonymous";
    const email = document.getElementById("email").value || "";
    const text = document.getElementById("message").value.trim();

    if (!text) return;

    const entry = {
        name: name,
        email: email,
        text: text,
        date: new Date().toLocaleString()
    };

    const saved = JSON.parse(localStorage.getItem("jp_messages") || "[]");
    saved.push(entry);
    localStorage.setItem("jp_messages", JSON.stringify(saved));

    loadMessages();

    document.getElementById("thankyou").style.display = "block";
    document.getElementById("contactForm").reset();
}

/* INITIAL LOAD */
loadMessages();

/* FOOTER */
fetch("/footer.html")
    .then(r => r.text())
    .then(html => {
        document.getElementById("footer-loader").innerHTML = html;
    });
</script>

</body>
</html>
