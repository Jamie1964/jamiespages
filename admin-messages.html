<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jamie’s Message Inbox</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        background:#111;
        color:#fff;
        font-family:'Roboto Condensed', sans-serif;
        padding:20px;
        font-style:italic;
    }

    h1 {
        color:#b366ff;
        text-shadow:0 0 12px #b366ff;
        font-size:40px;
        margin-bottom:25px;
        text-align:center;
    }

    .msg {
        background:#1a1a1a;
        border:1px solid #333;
        padding:18px;
        margin-bottom:25px;
        border-radius:10px;
        box-shadow:0 0 18px #000;
        position:relative;
    }

    .msg strong {
        color:#b366ff;
        text-shadow:0 0 8px #b366ff;
    }

    .delete-btn {
        position:absolute;
        top:15px;
        right:15px;
        background:#b366ff;
        border:none;
        padding:6px 12px;
        border-radius:6px;
        color:#111;
        font-weight:bold;
        cursor:pointer;
        box-shadow:0 0 12px #b366ff;
        transition:0.2s;
    }

    .delete-btn:hover {
        background:#d1a3ff;
        box-shadow:0 0 18px #d1a3ff;
    }

    .empty {
        color:#888;
        font-size:20px;
        text-align:center;
        margin-top:40px;
    }
</style>
</head>
<body>

<h1>Jamie’s Message Inbox</h1>

<div id="messages">Loading messages…</div>

<script>
function deleteMessage(id, element) {
    if (!confirm("Delete this message?")) return;

    fetch(`/api/messages/${id}`, { method: "DELETE" })
        .then(r => r.json())
        .then(res => {
            if (res.success) {
                element.remove();
            } else {
                alert("Failed to delete message.");
            }
        });
}

fetch("/api/messages")
    .then(r => r.json())
    .then(list => {
        const box = document.getElementById("messages");

        if (!list.length) {
            box.innerHTML = "<div class='empty'>No messages yet.</div>";
            return;
        }

        box.innerHTML = "";

        list.forEach(msg => {
            const div = document.createElement("div");
            div.className = "msg";

            div.innerHTML = `
                <button class="delete-btn">Delete</button>
                <p><strong>Name:</strong> ${msg.name}</p>
                <p><strong>Email:</strong> ${msg.email || "No email provided"}</p>
                <p><strong>Message:</strong><br>${msg.message}</p>
                <p><strong>Sent:</strong> ${msg.timestamp}</p>
            `;

            div.querySelector(".delete-btn").onclick = () => deleteMessage(msg.id, div);

            box.appendChild(div);
        });
    });
</script>

</body>
</html>
